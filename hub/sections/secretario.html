    <div class="sec-card sec-visit">
      <header class="sec-section-head">
        <div>
          <p class="sec-section-title"><span class="material-symbols-outlined" aria-hidden="true">event_note</span>Visita do Superintendente</p>
          <p class="sec-section-desc">Informações e documentos que o Superintendente verá na Visão Geral.</p>
        </div>
        <div class="sec-visit-actions">
          <button type="button" id="sec-visit-new" class="sec-btn sec-btn--ghost">
            <span class="material-symbols-outlined" aria-hidden="true">add</span>Nova visita
          </button>
        </div>
      </header>

      <div class="sec-visit-toolbar">
        <label class="sec-field sec-field--inline">
          <span class="sec-label">Visita</span>
          <select id="sec-visit-select" class="sec-input"></select>
        </label>
        <label class="sec-check">
          <input type="checkbox" id="sec-visit-visible" checked/>
          <span>Visível ao Superintendente</span>
        </label>
      </div>

      <form id="sec-visit-form" class="sec-visit-form">
        <label class="sec-field">
          <span class="sec-label">Título</span>
          <input type="text" id="sec-visit-title" class="sec-input" placeholder="Visita do Superintendente de Circuito" required/>
        </label>
        <label class="sec-field">
          <span class="sec-label">Data da visita</span>
          <input type="date" id="sec-visit-date" class="sec-input"/>
        </label>
        <label class="sec-field sec-field--full">
          <span class="sec-label">Informações</span>
          <textarea id="sec-visit-notes" class="sec-input sec-textarea" rows="8" placeholder="Pontos da reunião com os anciãos, horários, observações…"></textarea>
        </label>
        <div class="sec-form-actions">
          <button type="submit" id="sec-visit-save" class="sec-btn sec-btn--primary">
            <span class="material-symbols-outlined" aria-hidden="true">save</span>Salvar
          </button>
          <button type="button" id="sec-visit-delete" class="sec-btn sec-btn--danger hidden">
            <span class="material-symbols-outlined" aria-hidden="true">delete</span>Excluir visita
          </button>
        </div>
      </form>

      <section class="sec-docs" aria-labelledby="sec-docs-title">
        <div class="sec-docs-head">
          <h3 id="sec-docs-title" class="sec-docs-title">Documentos</h3>
          <label class="sec-btn sec-btn--ghost sec-upload-btn">
            <span class="material-symbols-outlined" aria-hidden="true">upload_file</span>Enviar arquivo
            <input type="file" id="sec-visit-upload" hidden accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg,.webp,.txt"/>
          </label>
        </div>
        <p class="sec-docs-hint">PDF, Word, Excel, imagens ou texto — até 10 MB por arquivo.</p>
        <div id="sec-visit-docs" class="sec-docs-list"></div>
      </section>
    </div>
