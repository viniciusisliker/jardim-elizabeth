    <section class="board-month-toolbar" aria-label="Selecionar mês">
      <div class="board-month-toolbar__head">
        <div class="board-month-toolbar__pick">
          <div class="board-month-toolbar__icon" aria-hidden="true">
            <span class="material-symbols-outlined">calendar_month</span>
          </div>
          <div class="board-month-toolbar__field">
            <label for="dp-board-month">Mês do arranjo</label>
            <p class="board-month-toolbar__hint">Escolha o mês e clique em carregar para abrir ou criar o rascunho.</p>
            <input type="month" id="dp-board-month"/>
          </div>
          <div class="board-month-toolbar__actions">
            <button type="button" id="dp-btn-load-board" class="board-load-btn">
              <span class="material-symbols-outlined" style="font-size:1.125rem">folder_open</span>
              Carregar mês
            </button>
          </div>
        </div>
      </div>
      <div class="board-status-bar">
        <span class="board-status-bar__label">Arranjo atual</span>
        <p id="dp-board-label" class="text-sm font-bold text-primary m-0">—</p>
      </div>
    </section>

    <div id="dp-editor-shell" class="hidden">
      <div class="dp-editor-head">
        <nav class="dp-tab-nav" aria-label="Direção">
          <button type="button" data-tab="receive" class="tab-btn tab-active">Recebemos</button>
          <button type="button" data-tab="send" class="tab-btn text-on-surface-variant">Enviamos</button>
        </nav>
        <button type="button" id="dp-btn-save" class="dp-save-btn">
          <span class="material-symbols-outlined" aria-hidden="true">save</span>
          <span class="dp-save-btn-label">Salvar arranjo</span>
        </button>
      </div>

      <div id="dp-stats" class="dp-stats" aria-live="polite"></div>
      <div id="dp-timeline" class="dp-timeline" role="tablist" aria-label="Linha do tempo do mês"></div>

      <details class="dp-add-menu" id="dp-add-menu">
        <summary class="dp-add-menu-toggle">
          <span class="material-symbols-outlined" aria-hidden="true">add</span>
          Adicionar linha
        </summary>
        <div class="dp-toolbar-actions">
          <button type="button" id="dp-btn-regen-saturdays" class="dp-mini-btn"><span class="material-symbols-outlined" aria-hidden="true">refresh</span>Regenerar sábados</button>
          <button type="button" id="dp-btn-add-speech" class="dp-mini-btn">+ Discurso</button>
          <button type="button" id="dp-btn-add-convention" class="dp-mini-btn">+ Congresso</button>
          <button type="button" id="dp-btn-add-special" class="dp-mini-btn">+ Visita SC</button>
          <button type="button" id="dp-btn-add-note" class="dp-mini-btn">+ Nota</button>
        </div>
      </details>

      <div class="dp-workspace">
        <nav id="dp-nav" class="dp-nav" aria-label="Entradas do mês"></nav>
        <div id="dp-editor-host"></div>
        <aside id="dp-preview" class="dp-preview-card" aria-live="polite">
          <p class="dp-preview-label">Pré-visualização</p>
          <div id="dp-preview-body" class="dp-preview-empty">Selecione uma entrada para ver o resumo.</div>
        </aside>
      </div>
    </div>
  <datalist id="dp-characteristics-list">
    <option value="Bíblia/Deus"></option>
    <option value="Provações/Problemas"></option>
    <option value="Religião/Adoração"></option>
    <option value="Março/Agosto - SC"></option>
    <option value="Orador Local"></option>
  </datalist>
