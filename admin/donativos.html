<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Donativos | Jardim Elizabeth</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0f3462',secondary:'#3b5e97','outline-variant':'#c3c6d0','on-surface-variant':'#43474f',background:'#fbf9f8',error:'#ba1a1a'}}}}</script>
  <style>
    @media (max-width: 767px) {
      #donations-form button[type="submit"] { min-height: 2.75rem; }
    }
  </style>
</head>
<body class="bg-background min-h-screen flex flex-col" style="font-family:Inter,sans-serif">
  <div id="header"></div>
  <main class="flex-1 max-w-xl mx-auto w-full px-6 py-10">
    <div class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-4"><a href="../hub.html" class="text-secondary">Hub</a> / <span class="text-primary">Donativos</span></div>
    <h1 class="text-2xl font-extrabold text-primary mb-6">Gerenciar Donativos</h1>
    <p id="admin-toast" class="hidden text-sm mb-4"></p>
    <form id="donations-form" class="bg-white border border-outline-variant rounded-xl p-6 space-y-4">
      <label class="block text-sm font-semibold text-primary">Chave PIX<input id="pix-key" required class="mt-1 w-full rounded-lg border-outline-variant text-sm"/></label>
      <label class="block text-sm font-semibold text-primary">Tipo da chave<input id="pix-type" class="mt-1 w-full rounded-lg border-outline-variant text-sm"/></label>
      <label class="block text-sm font-semibold text-primary">Titular<input id="holder" class="mt-1 w-full rounded-lg border-outline-variant text-sm"/></label>
      <label class="block text-sm font-semibold text-primary">Banco<input id="bank" class="mt-1 w-full rounded-lg border-outline-variant text-sm"/></label>
      <label class="block text-sm font-semibold text-primary">URL do QR Code<input id="qr-url" class="mt-1 w-full rounded-lg border-outline-variant text-sm"/></label>
      <label class="block text-sm font-semibold text-primary">Aviso legal<textarea id="disclaimer" rows="3" class="mt-1 w-full rounded-lg border-outline-variant text-sm"></textarea></label>
      <button type="submit" class="bg-secondary text-white text-sm font-semibold px-4 py-2 rounded-lg w-full">Salvar alterações</button>
    </form>
  </main>
  <div id="footer"></div>
  <script src="../js/config.js"></script><script src="../js/auth.js"></script><script src="../js/header.js"></script><script src="../js/site-loader.js"></script><script src="../js/je-toast.js?v=2026060301"></script><script src="../js/je-dialog.js?v=2026060301"></script><script src="../js/admin-core.js?v=2026060301"></script><script src="../js/admin/donativos.js"></script>
</body>
</html>
