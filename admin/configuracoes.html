<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Configurações | Jardim Elizabeth</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0f3462',secondary:'#3b5e97','outline-variant':'#c3c6d0','on-surface-variant':'#43474f',background:'#fbf9f8',error:'#ba1a1a'}}}}</script>
</head>
<body class="bg-background min-h-screen flex flex-col" style="font-family:Inter,sans-serif">
  <div id="header"></div>
  <main class="flex-1 max-w-4xl mx-auto w-full px-6 py-10">
    <div class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-4"><a href="../hub.html" class="text-secondary">Hub</a> / <span class="text-primary">Configurações</span></div>
    <h1 class="text-2xl font-extrabold text-primary mb-1">Equipe e Permissões</h1>
    <p id="cfg-role-note" class="text-sm text-on-surface-variant mb-6"></p>
    <p id="admin-toast" class="hidden text-sm mb-4"></p>
    <div class="bg-white border border-outline-variant rounded-xl overflow-hidden">
      <div class="hidden md:grid md:grid-cols-4 gap-2 px-4 py-2 bg-surface-container-low text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">
        <span>Nome</span><span>Usuário</span><span>Cargo</span><span>Designação</span>
      </div>
      <div id="members-table"></div>
    </div>
    <p class="mt-6 text-xs text-on-surface-variant">Cargos com acesso ao hub: SuperUser, Ancião e Servo Ministerial.</p>
  </main>
  <div id="footer"></div>
  <script src="../js/config.js"></script><script src="../js/auth.js"></script><script src="../js/header.js"></script><script src="../js/site-loader.js"></script><script src="../js/admin-core.js"></script><script src="../js/admin/configuracoes.js"></script>
</body>
</html>
